        function applyFavicon() {
          // modo escuro → logo branco; modo claro → logo preto
          var suffix = mq.matches ? '' : '-black';
          document.querySelectorAll('link[rel="icon"][type="image/png"]').forEach(function (link) {
            var size = (link.getAttribute('sizes') || '').indexOf('16') === 0 ? 16 : 32;

          });
        }
        applyFavicon();
        if (mq.addEventListener) mq.addEventListener('change', applyFavicon);
      })();
    </script>
